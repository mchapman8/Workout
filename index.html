<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Week 1 Workout</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0f;--surf:#17171a;--surf2:#202024;--border:#2a2a2f;
  --text:#f0efe8;--muted:#65656f;
  --str:#c8f060;--run:#60c8f0;--af:#f060a8;--rest:#55555f;
  --good:#c8f060;--warn:#f0a860;--bad:#f06060;--info:#60c8f0;--purple:#c060f0;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--fm);min-height:100vh;overscroll-behavior:none}
body{padding-bottom:60px}

.topbar{position:sticky;top:0;z-index:100;background:rgba(14,14,15,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 20px 12px}
.safe-top{height:env(safe-area-inset-top,0px)}
.top-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.top-title{font-family:var(--fh);font-size:22px;font-weight:800;line-height:1}
.top-sub{font-size:11px;color:var(--muted);margin-top:3px}

.nav-strip{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.nav-strip::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surf);cursor:pointer;transition:all .15s}
.nav-btn .n-label{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--muted)}
.n-dot{width:5px;height:5px;border-radius:50%}
.nav-btn.active-dash{border-color:var(--purple);background:#1a0a22}
.nav-btn.active-dash .n-label{color:var(--purple)}
.nav-btn.active-str{border-color:var(--str);background:#141c08}
.nav-btn.active-str .n-label{color:var(--str)}
.nav-btn.active-run{border-color:var(--run);background:#081620}
.nav-btn.active-run .n-label{color:var(--run)}
.nav-btn.active-af{border-color:var(--af);background:#200a14}
.nav-btn.active-af .n-label{color:var(--af)}
.nav-btn.active-rest{border-color:var(--muted);background:#141416}
.nav-btn.active-rest .n-label{color:var(--muted)}

.content{padding:20px}

/* ── DASHBOARD ── */
.dash-h{font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;display:flex;align-items:center;gap:10px}
.dash-h::after{content:'';flex:1;height:1px;background:var(--border)}
.dash-h:first-child{margin-top:0}

.alert-card{border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.alert-warn{background:#1e1308;border:1px solid #3a2510}
.alert-bad{background:#1e0808;border:1px solid #3a1010}
.alert-good{background:#0f1a06;border:1px solid #2a3a10}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-title{font-family:var(--fh);font-size:13px;font-weight:700;margin-bottom:3px}
.alert-warn .alert-title{color:var(--warn)}
.alert-bad .alert-title{color:var(--bad)}
.alert-good .alert-title{color:var(--good)}
.alert-body{font-size:11px;color:var(--muted);line-height:1.6}

.metrics-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.metrics-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.m-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.m-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.m-card.c-good::before{background:var(--good)}
.m-card.c-warn::before{background:var(--warn)}
.m-card.c-bad::before{background:var(--bad)}
.m-card.c-info::before{background:var(--info)}
.m-card.c-purple::before{background:var(--purple)}
.m-card.c-muted::before{background:var(--muted)}
.m-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.m-val{font-family:var(--fh);font-size:22px;font-weight:800;line-height:1}
.m-unit{font-size:11px;color:var(--muted);margin-left:2px}
.m-sub{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}
.m-status{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin-top:5px;font-weight:500}
.s-good{background:#141c08;color:var(--good)}
.s-warn{background:#1e1308;color:var(--warn)}
.s-bad{background:#1e0808;color:var(--bad)}
.s-info{background:#081620;color:var(--info)}

.bar-wrap{height:4px;background:var(--surf2);border-radius:2px;margin-top:8px;overflow:hidden}
.bar{height:100%;border-radius:2px}

.week-table{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px}
.wt-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.wt-row:last-child{border-bottom:none}
.wt-day{color:var(--muted);min-width:32px}
.wt-val{font-weight:500;text-align:right}
.wt-bar-wrap{flex:1;height:4px;background:var(--surf2);border-radius:2px;margin:0 10px;overflow:hidden}
.wt-bar{height:100%;border-radius:2px}
.wt-flag{font-size:10px;margin-left:6px}

.sleep-row{display:flex;gap:3px;align-items:center;height:16px;border-radius:4px;overflow:hidden;margin-bottom:4px}
.sleep-seg{height:100%;border-radius:2px}
.sleep-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.sl-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.sl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.macro-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.macro-row:last-child{border-bottom:none}
.macro-lbl{color:var(--muted)}
.macro-vals{display:flex;gap:12px;align-items:center}
.macro-avg{font-weight:500}
.macro-tgt{font-size:10px;color:var(--muted)}
.macro-flag{font-size:10px;padding:1px 6px;border-radius:6px}

/* ── WORKOUT DAY ── */
.s-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:6px;margin-bottom:12px}
.s-tag-str{background:#141c08;color:var(--str);border:1px solid #263610}
.s-tag-run{background:#081620;color:var(--run);border:1px solid #103050}
.s-tag-af{background:#200a14;color:var(--af);border:1px solid #401828}
.s-tag-rest{background:#141416;color:var(--muted);border:1px solid var(--border)}
.s-title{font-family:var(--fh);font-size:24px;font-weight:800;line-height:1.1;margin-bottom:4px}
.s-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.s-timing{font-size:11px;font-weight:500;padding:6px 10px;border-radius:6px;display:inline-block;margin-bottom:16px}
.t-str{background:#141c08;color:var(--str)}
.t-run{background:#081620;color:var(--run)}
.t-af{background:#200a14;color:var(--af)}
.t-rest{background:#141416;color:var(--muted)}

.focus-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:20px}
.focus-title{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.focus-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.focus-tag{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:500}
.ft-vo2{background:#081620;color:var(--run);border:1px solid #103050}
.ft-hr{background:#200a14;color:var(--af);border:1px solid #401828}
.ft-hrv{background:#141c08;color:var(--good);border:1px solid #263610}
.ft-bf{background:#1e1308;color:var(--warn);border:1px solid #362008}
.ft-str{background:#1a0a22;color:var(--purple);border:1px solid #2e1040}
.focus-why{font-size:11px;color:var(--muted);line-height:1.6}

.sec-lbl{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:10px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

.af-block{background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--af);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.af-name{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:5px}
.af-sub{font-size:12px;color:var(--muted);line-height:1.6}

.ex{background:var(--surf);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.ex.open{border-color:#383840}
.ex-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;user-select:none}
.ex-hdr:active{background:var(--surf2)}
.ex-left{flex:1;min-width:0}
.ex-name{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.ex-sets{font-size:11px;color:var(--str);font-weight:500;margin-bottom:5px}
.ex-badges{display:flex;gap:5px;flex-wrap:wrap}
.ex-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.eb-vo2{background:#081620;color:var(--run);border:1px solid #103050}
.eb-hr{background:#200a14;color:var(--af);border:1px solid #401828}
.eb-hrv{background:#141c08;color:var(--good);border:1px solid #263610}
.eb-bf{background:#1e1308;color:var(--warn);border:1px solid #362008}
.eb-str{background:#1a0a22;color:var(--purple);border:1px solid #2e1040}
.ex-arr{font-size:13px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.ex.open .ex-arr{transform:rotate(180deg)}
.ex-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.ex.open .ex-body{display:block}
.how-lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
.how-step{display:flex;gap:10px;margin-bottom:9px;font-size:12px;color:var(--text);line-height:1.65}
.how-n{min-width:20px;height:20px;border-radius:50%;background:var(--surf2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);flex-shrink:0;margin-top:1px}
.callout{border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;line-height:1.55}
.c-tip{background:#121a07;color:#9acc38;border:1px solid #203608}
.c-warn{background:#1e1308;color:#d09040;border:1px solid #362008}
.c-prog{background:#071420;color:#40aad0;border:1px solid #0c2840}
.c-metric{background:#12071e;color:#b060e8;border:1px solid #241040}
.c-lbl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;opacity:.65}

.run-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.run-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:14px}
.run-card-full{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.run-lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.run-val{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--run);line-height:1}
.run-note{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}
.rest-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.rest-name{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:4px}
.rest-sub{font-size:12px;color:var(--muted);line-height:1.55}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.updated{font-size:10px;color:var(--muted);text-align:center;margin-top:20px}
</style>
</head>
<body>
<div class="topbar">
  <div class="safe-top"></div>
  <div class="top-eyebrow">Week 1 · Apr 13 2026</div>
  <div class="top-title" id="top-title">Dashboard</div>
  <div class="top-sub" id="top-sub">Full health overview</div>
</div>
<div class="nav-strip" id="nav-strip"></div>
<div class="content" id="content"></div>

<script>
const NAV=[
  {short:'Dash',type:'dash',title:'Dashboard',sub:'Full health overview'},
  {short:'Mon',type:'str',title:'Full body — Session A',sub:'Strength + Apple Fitness+'},
  {short:'Tue',type:'run',title:'Run — easy Zone 2',sub:'Evening run'},
  {short:'Wed',type:'str',title:'Full body — Session B',sub:'Strength + Apple Fitness+'},
  {short:'Thu',type:'run',title:'Run — easy Zone 2',sub:'Evening run'},
  {short:'Fri',type:'str',title:'Full body — Session C',sub:'Strength + Apple Fitness+'},
  {short:'Sat',type:'af',title:'Apple Fitness+ + run',sub:'AF+ morning · run evening'},
  {short:'Sun',type:'rest',title:'Full rest + recovery',sub:'Walks only'}
];

const DAYS=[
{type:'str',timing:'6:00–7:30am · before Apple work',
 pills:['LIAP 3:47–6am','Strength 6–7:30am','Walk ~8am','Apple 8:30am'],
 focus:['VO2 Max','Muscle strength','Body fat','HRV'],
 focusCls:['ft-vo2','ft-str','ft-bf','ft-hrv'],
 focusWhy:'Compound bodyweight movements elevate heart rate contributing to VO2 Max. Resistance training preserves muscle during your caloric deficit, directly improving body composition.',
 sections:[
  {l:'Warm-up — Apple Fitness+ (8 min)',type:'af',items:[{name:'Yoga or mobility session',sub:'Pick any Yoga or Mobility session. Run 8 minutes. Focus on shoulder circles, chest openers, and hip mobility.'}]},
  {l:'Block 1 — Push (10 min)',type:'ex',items:[
   {name:'Incline push-ups',sets:'3 sets × 10 reps',badges:[{t:'Muscle strength',c:'eb-str'},{t:'Body fat',c:'eb-bf'}],
    metricNote:'Builds pushing strength across chest, shoulders and triceps. Muscle mass raises resting metabolic rate, accelerating fat loss.',
    how:['Find a wall, counter, or sturdy chair — the higher the surface, the easier.','Place hands shoulder-width apart, arms fully extended.','Walk feet back until your body forms a straight diagonal line from head to heel.','Bend elbows slowly and lower your chest toward the surface (2 counts down).','Push back up to start (1 count up). Core stays tight the entire time.'],
    tip:'If 10 feels easy, use a lower surface. If hard, raise it.',warn:'Hips must not sag or pike. Straight line head to heel.',prog:'Week 3: move to floor push-ups when you hit 3×10 with clean form.'},
   {name:'Pike push-ups',sets:'3 sets × 8 reps',badges:[{t:'Muscle strength',c:'eb-str'},{t:'VO2 Max',c:'eb-vo2'}],
    metricNote:'Shoulder-dominant push. Inverted position elevates heart rate, giving a small cardiovascular benefit on top of strength work.',
    how:['Start in downward dog — hips high, body forming an inverted V.','Hands slightly wider than shoulder-width, fingers spread.','Bend elbows and lower the top of your head toward the floor between your hands.','Push back up to the inverted V. That is one rep.'],
    tip:'The higher your hips, the more shoulder load.',warn:'Do not let your hips drop toward the floor.'}
  ]},
  {l:'Block 2 — Legs & glutes (12 min)',type:'ex',items:[
   {name:'Bodyweight squats',sets:'3 sets × 15 reps',badges:[{t:'VO2 Max',c:'eb-vo2'},{t:'Body fat',c:'eb-bf'},{t:'Muscle strength',c:'eb-str'}],
    metricNote:'Largest muscle groups in the body. High rep squats elevate heart rate significantly — best bodyweight exercise for VO2 Max and calorie burn.',
    how:['Stand feet shoulder-width apart, toes turned out slightly.','Hold arms straight out in front for balance.','Push hips back and bend knees, lowering until thighs are parallel to the floor.','Drive through heels to stand. Squeeze glutes at the top.'],
    tip:'Imagine sitting back onto a chair — weight stays in your heels.',warn:'Knees track over toes. Do not let them cave inward.',prog:'Week 3: add a 2-second pause at the bottom.'},
   {name:'Reverse lunges',sets:'3 sets × 10 reps each leg',badges:[{t:'Muscle strength',c:'eb-str'},{t:'Body fat',c:'eb-bf'}],
    metricNote:'Single leg training builds balanced strength and burns more calories than bilateral movements. Key driver of lower body definition.',
    how:['Stand tall, feet together, hands on hips.','Step one foot back 2–3 feet and lower your back knee toward the floor.','Both knees reach roughly 90 degrees at the bottom.','Push through your front heel to return. Alternate legs.'],
    tip:'Reverse lunges are gentler on the knees than forward lunges.',warn:'Keep chest upright. Do not let your front knee shoot past your toes.'}
  ]},
  {l:'Block 3 — Core (8 min)',type:'ex',items:[
   {name:'Dead bug',sets:'3 sets × 10 reps each side',badges:[{t:'HRV',c:'eb-hrv'},{t:'Muscle strength',c:'eb-str'}],
    metricNote:'Deep core stability reduces injury risk and improves movement efficiency. Lower injury risk supports training consistency which keeps HRV stable.',
    how:['Lie on your back, arms pointing straight up.','Bend knees to 90 degrees, shins parallel to the floor.','Press your lower back firmly into the floor — hold it there.','Slowly lower right arm overhead and left leg toward the floor simultaneously.','Stop before they touch, bring both back. Switch sides. That is one rep each side.'],
    tip:'If your lower back lifts, you went too far.',warn:'Slow and controlled. Speed defeats the purpose.'},
   {name:'Plank',sets:'3 sets × 20 seconds',badges:[{t:'HRV',c:'eb-hrv'},{t:'Muscle strength',c:'eb-str'}],
    metricNote:'Isometric core tension improves posture and spinal stability. Low nervous system demand — good for HRV recovery days.',
    how:['Get into push-up position but rest on forearms.','Elbows directly under shoulders, forearms flat on the floor.','Body is a straight line from head to heels — no sagging hips.','Breathe normally and hold.'],
    tip:'Squeeze glutes and quads — makes the hold much easier.',warn:'The moment your hips sag, stop and rest.',prog:'Add 5 seconds each week once the current hold feels easy.'}
  ]},
  {l:'Cooldown — Apple Fitness+ (5–8 min)',type:'af',items:[{name:'Cooldown stretch session',sub:'Pick any Cooldown or Stretching session. Focus on chest, shoulders, and hip flexors.'}]}
 ]},

{type:'run',timing:'6:00–6:45pm · after Apple work',
 pills:['LIAP 3:47–6am','Apple 8:30am–5:30pm','Run 6–6:45pm'],
 focus:['VO2 Max','Resting HR','Body fat'],focusCls:['ft-vo2','ft-hr','ft-bf'],
 focusWhy:'Zone 2 running is the single most effective method for improving VO2 Max and lowering resting HR. At easy pace your body burns primarily fat — directly targeting body fat %.',
 sections:[
  {l:'Your Week 1 run',type:'run',items:[
   {lbl:'Distance',val:'1.0 mi',note:'About 10–12 minutes of jogging at easy pace.'},
   {lbl:'Pace',val:'Zone 2',note:'Hold a full conversation the entire time. If you cannot speak in sentences, slow down.'},
   {lbl:'Structure',val:'Run/walk OK',note:'3 min jog / 1 min walk is completely fine in week 1.'}
  ]},
  {l:'Zone 2 explained',type:'ex',items:[
   {name:'Zone 2 running',sets:'The whole run',badges:[{t:'VO2 Max',c:'eb-vo2'},{t:'Resting HR',c:'eb-hr'},{t:'Body fat',c:'eb-bf'}],
    metricNote:'Zone 2 is the primary driver of VO2 Max improvement. Consistent Zone 2 work lowers resting HR over 8–12 weeks. At this intensity your body oxidizes fat as primary fuel.',
    how:['Zone 2 is aerobic — body burns fat, heart works but is not racing.','Target: speak in full sentences but would not want to sing.','Apple Watch: heart rate 60–70% of max, roughly 125–145 bpm.','If above 145 bpm, slow down or walk for 30 seconds.','At the end you should feel like you could have kept going.'],
    tip:'Most beginners run too fast. Zone 2 feels embarrassingly slow. That is correct.',warn:'Do not skip easy pace in week 1. Too hard too soon causes burnout.'}
  ]},
  {l:'Post-run stretch (5 min)',type:'ex',items:[
   {name:'Standing quad stretch',sets:'30 sec each leg',badges:[{t:'HRV',c:'eb-hrv'}],metricNote:'Post-run stretching reduces muscular tension and supports parasympathetic recovery — directly improves HRV.',
    how:['Stand on one leg, bend other knee, hold ankle behind you.','Keep knees together. Stand tall. 30 seconds each side.'],tip:'Hold a wall if balance is tricky.',warn:''},
   {name:'Calf stretch against wall',sets:'30 sec each leg',badges:[{t:'HRV',c:'eb-hrv'}],metricNote:'Calf tightness restricts blood flow. Stretching supports faster recovery and better overnight HRV.',
    how:['Face a wall, step one foot back, keep heel flat.','Lean into wall with straight back leg until you feel the calf stretch.','30 seconds each side.'],tip:'Flex your foot (toes toward you) to deepen the stretch.',warn:''}
  ]}
 ]},

{type:'str',timing:'6:00–7:30am · before Apple work',
 pills:['LIAP 3:47–6am','Strength 6–7:30am','Walk ~8am','Apple 8:30am'],
 focus:['Muscle strength','Body fat','HRV','VO2 Max'],focusCls:['ft-str','ft-bf','ft-hrv','ft-vo2'],
 focusWhy:'Session B rotates to pulling and squatting patterns for full body balance. Balanced strength development protects joints and reduces injury risk — keeping HRV stable.',
 sections:[
  {l:'Warm-up — Apple Fitness+ (8 min)',type:'af',items:[{name:'HIIT warm-up or Pilates',sub:'Choose HIIT or Pilates. Activates glutes, opens hips, warms up the back.'}]},
  {l:'Block 1 — Pull (10 min)',type:'ex',items:[
   {name:'Table rows',sets:'3 sets × 10 reps',badges:[{t:'Muscle strength',c:'eb-str'},{t:'Body fat',c:'eb-bf'}],
    metricNote:'Back and bicep pulling strength. Balances Monday pushing. Muscle balance reduces injury risk and supports training longevity.',

      <div class="sl-item"><div class="sl-dot" style="background:#6060c0"></div>REM</div>
      <div class="sl-item"><div class="sl-dot" style="background:#2040a0"></div>Deep</div>
      <div class="sl-item"><div class="sl-dot" style="background:#302030"></div>Awake</div>
    </div>
  </div>`;

  // Wrist temp
  h+=`<div class="metrics-2">
    <div class="m-card c-good">
      <div class="m-lbl">Wrist temp (sleep)</div>
      <div class="m-val">36.3<span class="m-unit">°C</span></div>
      <span class="m-status s-good">Normal</span>
      <div class="m-sub">97.3°F · No fever or illness signal</div>
    </div>
    <div class="m-card c-muted">
      <div class="m-lbl">Water intake</div>
      <div class="m-val">—</div>
      <span class="m-status" style="background:#1a1a1c;color:var(--muted)">Not logged</span>
      <div class="m-sub">Log water in Health app · Target 3L/day with training</div>
    </div>
  </div>`;

  // Burnout thresholds
  h+=`<div class="dash-h">Burnout thresholds</div>`;
  h+=`<div class="week-table">
    <div class="wt-row"><span style="font-size:12px;color:var(--muted)">HRV below 50ms</span><span class="wt-val"><span class="m-status s-good">80.6ms — safe</span></span></div>
    <div class="wt-row"><span style="font-size:12px;color:var(--muted)">Resting HR above 65 bpm</span><span class="wt-val"><span class="m-status s-good">59 bpm — safe</span></span></div>
    <div class="wt-row"><span style="font-size:12px;color:var(--muted)">VO2 Max declining 3+ wks</span><span class="wt-val"><span class="m-status s-bad">Triggered — monitor</span></span></div>
    <div class="wt-row"><span style="font-size:12px;color:var(--muted)">Sleep fragmentation</span><span class="wt-val"><span class="m-status s-warn">Elevated — address</span></span></div>
  </div>`;

  h+=`<div class="updated">Last synced from Apple Health · Apr 13 2026 · Update each Sunday</div>`;
  document.getElementById('content').innerHTML=h;
}

function renderDay(i){
  const d=DAYS[i];
  const nav=NAV[i+1];
  const dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  document.getElementById('top-title').textContent=dayNames[i];
  document.getElementById('top-sub').textContent=nav.title;
  const tagCls={str:'s-tag-str',run:'s-tag-run',af:'s-tag-af',rest:'s-tag-rest'}[d.type];
  const tagLbl={str:'Strength',run:'Run',af:'AF+ Day',rest:'Rest'}[d.type];
  const timCls={str:'t-str',run:'t-run',af:'t-af',rest:'t-rest'}[d.type];
  let h=`<span class="s-tag ${tagCls}">${tagLbl}</span>
    <div class="s-title">${nav.title}</div>
    <div class="s-sub">${nav.sub}</div>
    <div class="s-timing ${timCls}">${d.timing}</div>
    <div class="focus-card">
      <div class="focus-title">Today's metric focus</div>
      <div class="focus-tags">${d.focus.map((f,fi)=>`<span class="focus-tag ${d.focusCls[fi]}">${f}</span>`).join('')}</div>
      <div class="focus-why">${d.focusWhy}</div>
    </div>`;
  d.sections.forEach(s=>{
    h+=`<div class="sec-lbl">${s.l}</div>`;
    if(s.type==='af'){
      s.items.forEach(it=>{h+=`<div class="af-block"><div class="af-name">${it.name}</div><div class="af-sub">${it.sub}</div></div>`;});
    } else if(s.type==='run'){
      const grid=s.items.filter(it=>it.lbl);
      const exs=s.items.filter(it=>!it.lbl);
      if(grid.length===2){
        h+=`<div class="run-grid">`;
        grid.slice(0,2).forEach(it=>{h+=`<div class="run-card"><div class="run-lbl">${it.lbl}</div><div class="run-val">${it.val}</div><div class="run-note">${it.note}</div></div>`;});
        h+=`</div>`;
        if(grid[2])h+=`<div class="run-card-full"><div class="run-lbl">${grid[2].lbl}</div><div class="run-val">${grid[2].val}</div><div class="run-note">${grid[2].note}</div></div>`;
      } else {
        grid.forEach(it=>{h+=`<div class="run-card-full"><div class="run-lbl">${it.lbl}</div><div class="run-val">${it.val}</div><div class="run-note">${it.note}</div></div>`;});
      }
      exs.forEach((it,idx)=>{h+=buildEx(it,`${i}-${s.l}-${idx}`);});
    } else if(s.type==='rest'){
      s.items.forEach(it=>{h+=`<div class="rest-card"><div class="rest-name">${it.name}</div><div class="rest-sub">${it.sub}</div></div>`;});
    } else {
      s.items.forEach((it,idx)=>{h+=buildEx(it,`${i}-${s.l}-${idx}`);});
    }
  });
  h+=`<div class="pill-row">${d.pills.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`;
  document.getElementById('content').innerHTML=h;
}

function buildEx(it,uid){
  const badges=(it.badges||[]).map(b=>`<span class="ex-badge ${b.c}">${b.t}</span>`).join('');
  let h=`<div class="ex" id="ex-${uid}">
    <div class="ex-hdr" onclick="toggleEx('${uid}')">
      <div class="ex-left">
        <div class="ex-name">${it.name}</div>
        <div class="ex-sets">${it.sets||''}</div>
        ${badges?`<div class="ex-badges">${badges}</div>`:''}
      </div>
      <div class="ex-arr">&#9662;</div>
    </div>
    <div class="ex-body">`;
  if(it.metricNote)h+=`<div class="callout c-metric"><div class="c-lbl">Why this helps your metrics</div>${it.metricNote}</div>`;
  if(it.how&&it.how.length){
    h+=`<div class="how-lbl">How to do it</div>`;
    it.how.forEach((step,si)=>{h+=`<div class="how-step"><div class="how-n">${si+1}</div><div>${step}</div></div>`;});
  }
  if(it.tip)h+=`<div class="callout c-tip"><div class="c-lbl">Tip</div>${it.tip}</div>`;
  if(it.warn)h+=`<div class="callout c-warn"><div class="c-lbl">Watch out</div>${it.warn}</div>`;
  if(it.prog)h+=`<div class="callout c-prog"><div class="c-lbl">Progression</div>${it.prog}</div>`;
  h+=`</div></div>`;
  return h;
}

function toggleEx(uid){document.getElementById('ex-'+uid).classList.toggle('open')}

function go(i){
  sel=i;renderNav();
  if(i===0)renderDash();
  else renderDay(i-1);
  window.scrollTo({top:0,behavior:'smooth'});
}

const today=new Date().getDay();
sel=today===0?7:today===1?0:today-1;
if(sel>7)sel=0;
renderNav();
if(sel===0)renderDash();
else renderDay(sel-1);
</script>
</body>
</html>
